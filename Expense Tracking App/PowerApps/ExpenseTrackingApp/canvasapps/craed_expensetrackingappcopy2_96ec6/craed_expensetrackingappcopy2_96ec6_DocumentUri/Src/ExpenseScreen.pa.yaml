                        - Icon2:
                            Control: Classic/Icon@2.5.0
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              Color: =RGBA(0, 18, 107, 1)
                              Height: =44
                              Icon: =Icon.Trash
                              OnSelect: |-
                                =Remove(Expenses, Gallery2.Selected);
                                Refresh(Expenses);
                                Notify("Item Deleted")
                              Width: =43
                              X: =659
                              Y: =38
