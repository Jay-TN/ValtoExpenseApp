Screens:
  BusinessOverviewScreen:
    Properties:
      Fill: =
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =UpdateContext({varTab:{name:"Business Overview",Screen:BusinessOverviewScreen}});

        ClearCollect(
            expensesWithDepartment,
            AddColumns(
                Expenses,
                CategoryText,
                CategoryName,
                Department,
                LookUp(User, Title = Expenses[@UserID].Value, Department)
            )
        );
    Children:
      - BusinessOverviewGrid:
          Control: GroupContainer@1.5.0
          Variant: GridLayout
          Properties:
            Fill: =Color.DarkBlue
            Height: =Parent.Height
            LayoutGap: =16
            LayoutGridColumns: =10
            LayoutGridRows: =8
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - BusinessOverviewHeader:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGridColumnEnd: =-1
                  LayoutGridColumnStart: =1
                  LayoutGridRowEnd: =1
                  LayoutGridRowStart: =1
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                  X: =40
                  Y: =40
                Children:
                  - BusinessOverviewText:
                      Control: ModernText@1.0.0
                      Properties:
                        AutoHeight: =true
                        FillPortions: =1
                        FontWeight: =FontWeight.Bold
                        Height: =60
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        PaddingLeft: =25
                        Size: =25
                        Text: ="Business Expense Overview"
                  - BusinessOverviewUserIcon:
                      Control: Classic/Icon@2.5.0
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Color: =RGBA(0, 18, 107, 1)
                        Height: =62
                        Icon: =Icon.Person
                        OnSelect: =Set(showSignOut, !showSignOut)
                        X: =40
                        Y: =40
                  - BusinessOverviewSignOutContainer:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        FillPortions: =0
                        LayoutMinHeight: =16
                        LayoutMinWidth: =1
                        Visible: =showSignOut
                      Children:
                        - BusinessOverviewEmailLabel:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Semibold
                              Height: =41
                              Text: =currentUserEmail
                              Width: =251
                              X: =12
                              Y: =12
                        - BusinessOverviewSignOutButton:
                            Control: Button@0.0.45
                            Properties:
                              Height: =41
                              OnSelect: |-
                                =Set(showSignOut, false);
                                Set(currentUserEmail, Blank());
                                Set(currentUserRole, Blank());
                                Set(currentUserLogin, Blank());
                                Navigate(SignInScreen);
                              Text: ="SignOut"
                              Width: =119
                              X: =362
                              Y: =12
            - BussinessOverviewSideBar:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGridColumnEnd: =4
                  LayoutGridColumnStart: =1
                  LayoutGridRowEnd: =-1
                  LayoutGridRowStart: =2
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                  X: =40
                  Y: =40
                Children:
                  - BusinessOverviewSideBarNavigation:
                      Control: ModernTabList@1.0.0
                      Properties:
                        Alignment: =LayoutDirection.Vertical
                        Default: =varTab
                        FillPortions: =1
                        ItemDisplayText: =ThisItem.name
                        Items: =tablListItems
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        OnSelect: |-
                          =UpdateContext({varTab: Self.Selected});
                          Navigate(BusinessOverviewSideBarNavigation.Selected.Screen)
            - BussinessExpenseOverview:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGridColumnEnd: =-1
                  LayoutGridColumnStart: =4
                  LayoutGridRowEnd: =-1
                  LayoutGridRowStart: =2
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                  X: =40
                  Y: =40
                Children:
                  - PieChartContainer:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                      Children:
                        - Title17_1:
                            Control: Label@2.5.1
                            Group: CompositePieChart4_1
                            Properties:
                              Align: =Align.Center
                              BorderColor: =RGBA(0, 0, 0, 1)
                              Font: =Font.'Open Sans'
                              Height: =29
                              Size: =14
                              Text: ="Dev"
                              Width: =304
                              X: =304
                        - PieChart4_1:
                            Control: PieChart@2.3.0
                            Group: CompositePieChart4_1
                            Properties:
                              Height: =450
                              Items: |-
                                =AddColumns(
                                    GroupBy(
                                        Filter(expensesWithDepartment, Department = "Dev"),
                                        CategoryText,
                                        GroupedData
                                    ),
                                    TotalAmountText,
                                    "£" & Text(Sum(GroupedData, Amount), "#,##0.00")
                                )
                              Items.Labels: =TotalAmountText
                              Items.Series: =TotalAmountText
                              Width: =304
                              X: =304
                              Y: =34
                        - Legend5_1:
                            Control: Legend@2.1.0
                            Group: CompositePieChart4_1
                            Properties:
                              Font: =Font.'Open Sans'
                              Height: =212
                              ItemColorSet: =PieChart4_1.ItemColorSet
                              Items: |-
                                =AddColumns(
                                    GroupBy(
                                        Filter(expensesWithDepartment, Department = "Dev"),
                                        CategoryText,
                                        GroupedData
                                    ),
                                    TotalAmountText,
                                    "£" & Text(Sum(GroupedData, Amount), "#,##0.00")
                                )
                              Items.Value: =CategoryText
                              Size: =16
                              Width: =304
                              X: =304
                              Y: =414
                        - Title17_2:
                            Control: Label@2.5.1
                            Group: CompositePieChart4_2
                            Properties:
                              Align: =Align.Center
                              BorderColor: =RGBA(0, 0, 0, 1)
                              Font: =Font.'Open Sans'
                              Height: =29
                              Size: =14
                              Text: ="HR"
                              Width: =304
                              X: =608
                        - PieChart4_2:
                            Control: PieChart@2.3.0
                            Group: CompositePieChart4_2
                            Properties:
                              ContentLanguage: =
                              Height: =450
                              Items: |-
                                =AddColumns(
                                    GroupBy(
                                        Filter(expensesWithDepartment, Department = "HR"),
                                        CategoryText,
                                        GroupedData
                                    ),
                                    TotalAmountText,
                                    "£" & Text(Sum(GroupedData, Amount), "#,##0.00")
                                )
                              Items.Labels: =TotalAmountText
                              Items.Series: =TotalAmountText
                              Width: =304
                              X: =608
                              Y: =34
                        - Legend5_2:
                            Control: Legend@2.1.0
                            Group: CompositePieChart4_2
                            Properties:
                              Font: =Font.'Open Sans'
                              Height: =212
                              ItemColorSet: =PieChart4_2.ItemColorSet
                              Items: |-
                                =AddColumns(
                                    GroupBy(
                                        Filter(expensesWithDepartment, Department = "HR"),
                                        CategoryText,
                                        GroupedData
                                    ),
                                    TotalAmountText,
                                    "£" & Text(Sum(GroupedData, Amount), "#,##0.00")
                                )
                              Items.Value: =CategoryText
                              Size: =16
                              Width: =304
                              X: =608
                              Y: =414
                        - Title17:
                            Control: Label@2.5.1
                            Group: CompositePieChart4
                            Properties:
                              Align: =Align.Center
                              BorderColor: =RGBA(0, 0, 0, 1)
                              Font: =Font.'Open Sans'
                              Height: =29
                              Size: =14
                              Text: ="Finance"
                              Width: =304
                        - Legend5:
                            Control: Legend@2.1.0
                            Group: CompositePieChart4
                            Properties:
                              Font: =Font.'Open Sans'
                              Height: =212
                              ItemColorSet: =PieChart4.ItemColorSet
                              Items: |-
                                =AddColumns(
                                    GroupBy(
                                        Filter(expensesWithDepartment, Department = "Finance"),
                                        CategoryText,
                                        GroupedData
                                    ),
                                    TotalAmountText,
                                    "£" & Text(Sum(GroupedData, Amount), "#,##0.00")
                                )
                              Items.Value: =CategoryText
                              Size: =16
                              Width: =304
                              Y: =414
                        - PieChart4:
                            Control: PieChart@2.3.0
                            Group: CompositePieChart4
                            Properties:
                              Height: =450
                              Items: |-
                                =AddColumns(
                                    GroupBy(
                                        Filter(expensesWithDepartment, Department = "Finance"),
                                        CategoryText,
                                        GroupedData
                                    ),
                                    TotalAmountText,
                                    "£" & Text(Sum(GroupedData, Amount), "#,##0.00")
                                )
                              Items.Labels: =TotalAmountText
                              Items.Series: =TotalAmountText
                              Width: =304
                              Y: =34
