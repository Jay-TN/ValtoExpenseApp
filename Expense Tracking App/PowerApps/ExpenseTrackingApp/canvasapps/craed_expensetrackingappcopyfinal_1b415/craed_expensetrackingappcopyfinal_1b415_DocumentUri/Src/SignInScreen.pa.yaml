Screens:
  SignInScreen:
    Properties:
      Fill: =Color.DarkBlue
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: =Set(ErrorLabel,false)
    Children:
      - SignInFormContainer:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            Fill: =Color.White
            Height: =732
            Width: =874
            X: =280
            Y: =20
          Children:
            - EmailInput:
                Control: Classic/TextInput@2.3.2
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Default: =
                  Font: =Font.'Open Sans'
                  Height: =60
                  HintText: ="Enter Email Here"
                  HoverBorderColor: =RGBA(0, 18, 107, 1)
                  HoverFill: =RGBA(186, 202, 226, 1)
                  Width: =697
                  X: =92
                  Y: =193
            - PasswordInput:
                Control: Classic/TextInput@2.3.2
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Default: =
                  Font: =Font.'Open Sans'
                  Height: =60
                  HintText: ="Enter Password Here"
                  HoverBorderColor: =RGBA(0, 18, 107, 1)
                  HoverFill: =RGBA(186, 202, 226, 1)
                  Width: =697
                  X: =92
                  Y: =344
            - SignInLabel:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Bold
                  Height: =66
                  Size: =30
                  Text: ="Sign In"
                  Width: =152
                  X: =136
                  Y: =36
            - PasswordLabel:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Font: =Font.'Open Sans'
                  Text: ="Password:"
                  X: =92
                  Y: =304
            - ErrorHandlingLabel:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =RGBA(255, 0, 0, 1)
                  Font: =Font.'Open Sans'
                  Height: =47
                  Text: ="Incorrect Username and Password."
                  Visible: =ErrorLabel
                  Width: =697
                  X: =92
                  Y: =479
            - SignInButton:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =RGBA(56, 96, 178, 1)
                  Font: =Font.'Open Sans'
                  Height: =53
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
                  OnSelect: |
                    =Set(
                        currentUserLogin,
                        LookUp(
                            User,
                            Email = EmailInput.Text And Password = PasswordInput.Text
                        )
                    );
                    If(
                        IsBlankOrError(currentUserLogin),
                        Notify("Incorrect Username and Password");
                        Set(
                            ErrorLabel,
                            true
                        ),
                        Set(
                            currentUserEmail,
                            currentUserLogin.Email
                        );
                        Set(
                            currentUserRole,
                            currentUserLogin.Role.Value
                        );
                        Switch(
                            currentUserLogin.Role.Value,
                            "Employee",
                            Navigate(HomeScreen),
                            "Manager",
                            Navigate(HomeScreen),
                            "Admin",
                            Navigate(HomeScreen)
                        )
                    );
                    Reset(EmailInput);
                    Reset(PasswordInput);
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  Text: ="Sign In"
                  Width: =406
                  X: =242
                  Y: =558
            - EmailLabel:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Font: =Font.'Open Sans'
                  Text: ="Email"
                  X: =92
                  Y: =153
