Screens:
  AdminAreaEditScreen:
    Properties:
      Fill: =
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: =UpdateContext({varTab:{name:"Admin Area",Screen:AdminAreaEditScreen}});
    Children:
      - AdminAreaEditScreenGrid:
          Control: GroupContainer@1.5.0
          Variant: GridLayout
          Properties:
            Fill: =Color.DarkBlue
            Height: =Parent.Height
            LayoutGap: =16
            LayoutGridColumns: =10
            LayoutGridRows: =8
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - AdminAreaEditScreenHeader:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGridColumnEnd: =-1
                  LayoutGridColumnStart: =1
                  LayoutGridRowEnd: =1
                  LayoutGridRowStart: =1
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                  X: =40
                  Y: =40
                Children:
                  - AdminAreaEditText:
                      Control: ModernText@1.0.0
                      Properties:
                        AutoHeight: =true
                        FillPortions: =1
                        FontWeight: =FontWeight.Bold
                        Height: =60
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        PaddingLeft: =25
                        Size: =25
                        Text: ="Admin Area Editor"
                  - AdminAreaEditUserIcon:
                      Control: Classic/Icon@2.5.0
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Color: =RGBA(0, 18, 107, 1)
                        Height: =62
                        Icon: =Icon.Person
                        OnSelect: =Set(showSignOut, !showSignOut)
                        X: =40
                        Y: =40
                  - AdminAreaEditSignOutContainer:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        FillPortions: =0
                        LayoutMinHeight: =16
                        LayoutMinWidth: =1
                        Visible: =showSignOut
                      Children:
                        - AdminAreaEditUserEmailLabel:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Semibold
                              Height: =41
                              Text: =currentUserEmail
                              Width: =251
                              X: =12
                              Y: =12
                        - AdminAreaEditSignOutButton:
                            Control: Button@0.0.45
                            Properties:
                              Height: =41
                              OnSelect: |-
                                =Set(showSignOut, false);
                                Set(currentUserEmail, Blank());
                                Set(currentUserRole, Blank());
                                Set(currentUserLogin, Blank());
                                Navigate(SignInScreen);
                              Text: ="SignOut"
                              Width: =119
                              X: =362
                              Y: =12
            - AdminAreaEditNavigationSideBar:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGridColumnEnd: =4
                  LayoutGridColumnStart: =1
                  LayoutGridRowEnd: =-1
                  LayoutGridRowStart: =2
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                  X: =40
                  Y: =40
                Children:
                  - AdminAreaEditSideBarNavigation:
                      Control: ModernTabList@1.0.0
                      Properties:
                        Alignment: =LayoutDirection.Vertical
                        Default: =varTab
                        FillPortions: =1
                        ItemDisplayText: =ThisItem.name
                        Items: =tablListItems
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        OnSelect: |-
                          =UpdateContext({varTab: Self.Selected});
                          Navigate(AdminAreaEditSideBarNavigation.Selected.Screen)
            - AdminAreaEditContainer:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGridColumnEnd: =-1
                  LayoutGridColumnStart: =4
                  LayoutGridRowEnd: =-1
                  LayoutGridRowStart: =2
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                  X: =40
                  Y: =40
                Children:
                  - AdminAreaEditContainerForm:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                      Children:
                        - EditUserForm:
                            Control: Form@2.4.4
                            Variant: Classic
                            Layout: Vertical
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              DataSource: =User
                              Height: =561
                              Item: =UserGallery.Selected
                              Width: =913
                            Children:
                              - Department_DataCard2:
                                  Control: TypedDataCard@1.0.7
                                  Variant: ClassicTextualEdit
                                  Properties:
                                    BorderColor: =RGBA(0, 18, 107, 1)
                                    DataField: ="field_4"
                                    Default: =ThisItem.Department
                                    DisplayName: =DataSourceInfo([@User],DataSourceInfo.DisplayName,'field_4')
                                    MaxLength: =DataSourceInfo([@User], DataSourceInfo.MaxLength, 'field_4')
                                    Required: =true
                                    Update: =DataCardValue18_1.Selected.Value
                                    Width: =309
                                    X: =0
                                    Y: =0
                                  Children:
                                    - DataCardKey17:
                                        Control: Label@2.5.1
                                        MetadataKey: FieldName
                                        Properties:
                                          AutoHeight: =true
                                          BorderColor: =RGBA(0, 0, 0, 1)
                                          Color: =RGBA(0, 18, 107, 1)
                                          Font: =Font.'Open Sans'
                                          Height: =34
                                          Text: =Parent.DisplayName
                                          Width: =Parent.Width - 60
                                          Wrap: =false
                                          X: =30
                                          Y: =10
                                    - ErrorMessage17:
                                        Control: Label@2.5.1
                                        MetadataKey: ErrorMessage
                                        Properties:
                                          AutoHeight: =true
                                          BorderColor: =RGBA(0, 0, 0, 1)
                                          Color: =RGBA(168, 0, 0, 1)
                                          Font: =Font.'Open Sans'
                                          FontWeight: =FontWeight.Semibold
                                          Height: =10
                                          Live: =Live.Assertive
                                          PaddingBottom: =0
                                          PaddingLeft: =0
                                          PaddingRight: =0
                                          PaddingTop: =0
                                          Size: =14
                                          Text: =Parent.Error
                                          Visible: =Parent.DisplayMode=DisplayMode.Edit
                                          Width: =Parent.Width - 60
                                          X: =30
                                          Y: =DataCardValue18_1.Y + DataCardValue18_1.Height
                                    - StarVisible17:
                                        Control: Label@2.5.1
                                        MetadataKey: FieldRequired
                                        Properties:
                                          Align: =Align.Center
                                          BorderColor: =RGBA(0, 0, 0, 1)
                                          Color: =RGBA(0, 18, 107, 1)
                                          Font: =Font.'Open Sans'
                                          Height: =DataCardKey17.Height
                                          Text: ="*"
                                          Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                                          Width: =30
                                          Wrap: =false
                                          Y: =DataCardKey17.Y
                                    - DataCardValue18_1:
                                        Control: Classic/ComboBox@2.4.0
                                        Properties:
                                          BorderColor: =If(IsBlank(Parent.Error), Parent.BorderColor, Color.Red)
                                          ChevronBackground: =RGBA(56, 96, 178, 1)
                                          ChevronFill: =RGBA(255, 255, 255, 1)
                                          ChevronHoverBackground: =ColorFade(RGBA(56, 96, 178, 1), -20%)
                                          ChevronHoverFill: =RGBA(255, 255, 255, 1)
                                          DefaultSelectedItems: =Blank()
                                          DisplayFields: =["Value"]
                                          DisplayMode: =Parent.DisplayMode
                                          Font: =Font.'Open Sans'
                                          HoverFill: =RGBA(186, 202, 226, 1)
                                          Items: =["Finance", "Dev", "HR"]
                                          PaddingLeft: =If(Self.DisplayMode = DisplayMode.Edit, 5, 0)
                                          PressedColor: =RGBA(255, 255, 255, 1)
                                          PressedFill: =RGBA(0, 18, 107, 1)
                                          SearchFields: =["Value"]
                                          SelectMultiple: =false
                                          SelectionColor: =RGBA(255, 255, 255, 1)
                                          SelectionFill: =RGBA(56, 96, 178, 1)
                                          Tooltip: =Parent.DisplayName
                                          Width: =Parent.Width - 60
                                          X: =32
                                          Y: =56
                              - Role_DataCard2:
                                  Control: TypedDataCard@1.0.7
                                  Variant: ClassicComboBoxEdit
                                  Properties:
                                    BorderColor: =RGBA(0, 18, 107, 1)
                                    DataField: ="field_5"
                                    Default: =ThisItem.Role
                                    DisplayName: =DataSourceInfo([@User],DataSourceInfo.DisplayName,'field_5')
                                    Required: =true
                                    Update: =DataCardValue18.Selected
                                    Width: =309
                                    X: =1
                                    Y: =0
                                  Children:
                                    - DataCardKey18:
                                        Control: Label@2.5.1
                                        MetadataKey: FieldName
                                        Properties:
                                          AutoHeight: =true
                                          BorderColor: =RGBA(0, 0, 0, 1)
                                          Color: =RGBA(0, 18, 107, 1)
                                          Font: =Font.'Open Sans'
                                          Height: =34
                                          Text: =Parent.DisplayName
                                          Width: =Parent.Width - 60
                                          Wrap: =false
                                          X: =30
                                          Y: =10
                                    - DataCardValue18:
                                        Control: Classic/ComboBox@2.4.0
                                        MetadataKey: FieldValue
                                        Properties:
                                          BorderColor: =If(IsBlank(Parent.Error), Parent.BorderColor, Color.Red)
                                          ChevronBackground: =RGBA(56, 96, 178, 1)
                                          ChevronFill: =RGBA(255, 255, 255, 1)
                                          ChevronHoverBackground: =ColorFade(RGBA(56, 96, 178, 1), -20%)
                                          ChevronHoverFill: =RGBA(255, 255, 255, 1)
                                          DefaultSelectedItems: =Parent.Default
                                          DisplayFields: =["Value"]
                                          DisplayMode: =Parent.DisplayMode
                                          Font: =Font.'Open Sans'
                                          HoverFill: =RGBA(186, 202, 226, 1)
                                          Items: =["Admin", "Manager", "Employee"]
                                          PaddingLeft: =If(Self.DisplayMode = DisplayMode.Edit, 5, 0)
                                          PressedColor: =RGBA(255, 255, 255, 1)
                                          PressedFill: =RGBA(0, 18, 107, 1)
                                          SearchFields: =["Value"]
                                          SelectMultiple: =false
                                          SelectionColor: =RGBA(255, 255, 255, 1)
                                          SelectionFill: =RGBA(56, 96, 178, 1)
                                          Tooltip: =Parent.DisplayName
                                          Width: =Parent.Width - 60
                                          X: =32
                                          Y: =56
                                    - ErrorMessage18:
                                        Control: Label@2.5.1
                                        MetadataKey: ErrorMessage
                                        Properties:
                                          AutoHeight: =true
                                          BorderColor: =RGBA(0, 0, 0, 1)
                                          Color: =RGBA(168, 0, 0, 1)
                                          Font: =Font.'Open Sans'
                                          FontWeight: =FontWeight.Semibold
                                          Height: =10
                                          Live: =Live.Assertive
                                          PaddingBottom: =0
                                          PaddingLeft: =0
                                          PaddingRight: =0
                                          PaddingTop: =0
                                          Size: =14
                                          Text: =Parent.Error
                                          Visible: =Parent.DisplayMode=DisplayMode.Edit
                                          Width: =Parent.Width - 60
                                          X: =30
                                          Y: =DataCardValue18.Y + DataCardValue18.Height
                                    - StarVisible18:
                                        Control: Label@2.5.1
                                        MetadataKey: FieldRequired
                                        Properties:
                                          Align: =Align.Center
                                          BorderColor: =RGBA(0, 0, 0, 1)
                                          Color: =RGBA(0, 18, 107, 1)
                                          Font: =Font.'Open Sans'
                                          Height: =DataCardKey18.Height
                                          Text: ="*"
                                          Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                                          Width: =30
                                          Wrap: =false
                                          Y: =DataCardKey18.Y
      - ButtonCanvas1:
          Control: Button@0.0.45
          Properties:
            Height: =63
            OnSelect: |-
              =SubmitForm(EditUserForm);
              Notify("Successfully Edited");
              Navigate(AdminAreaScreen);
            Text: ="Save Changes"
            Width: =180
            X: =652
            Y: =296
