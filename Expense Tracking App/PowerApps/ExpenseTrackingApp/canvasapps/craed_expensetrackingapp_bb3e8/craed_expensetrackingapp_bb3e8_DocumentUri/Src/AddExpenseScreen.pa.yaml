Screens:
  AddExpenseScreen:
    Properties:
      Fill: =
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =UpdateContext({varTab:{name:"Add Expense",Screen:AddExpenseScreen}});
        NewForm(AddExpenseForm)
    Children:
      - AddExpenseScreenGrid:
          Control: GroupContainer@1.5.0
          Variant: GridLayout
          Properties:
            Fill: =Color.DarkBlue
            Height: =Parent.Height
            LayoutGap: =16
            LayoutGridColumns: =10
            LayoutGridRows: =8
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - AddExpenseScreenHeader:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGridColumnEnd: =-1
                  LayoutGridColumnStart: =1
                  LayoutGridRowEnd: =1
                  LayoutGridRowStart: =1
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                  X: =40
                  Y: =40
                Children:
                  - AddExpenseText:
                      Control: ModernText@1.0.0
                      Properties:
                        AutoHeight: =true
                        FillPortions: =1
                        FontWeight: =FontWeight.Bold
                        Height: =60
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        PaddingLeft: =25
                        Size: =25
                        Text: ="Add Expense"
                  - AddExpenseUserIcon:
                      Control: Classic/Icon@2.5.0
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Color: =RGBA(0, 18, 107, 1)
                        Height: =62
                        Icon: =Icon.Person
                        OnSelect: =Set(showSignOut, !showSignOut)
                        X: =40
                        Y: =40
                  - AddExpenseSignOutContainer:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        FillPortions: =0
                        LayoutMinHeight: =16
                        LayoutMinWidth: =1
                        Visible: =showSignOut
                      Children:
                        - AddExpenseUserEmailLabel:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Semibold
                              Height: =41
                              Text: =currentUserEmail
                              Width: =251
                              X: =12
                              Y: =12
                        - AddExpenseSignOutButton:
                            Control: Button@0.0.45
                            Properties:
                              Height: =41
                              OnSelect: |-
                                =Set(showSignOut, false);
                                Set(currentUserEmail, Blank());
                                Set(currentUserRole, Blank());
                                Set(currentUserLogin, Blank());
                                Navigate(SignInScreen);
                              Text: ="SignOut"
                              Width: =119
                              X: =362
                              Y: =12
            - AddExpenseNavigationSideBar:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGridColumnEnd: =4
                  LayoutGridColumnStart: =1
                  LayoutGridRowEnd: =-1
                  LayoutGridRowStart: =2
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                  X: =40
                  Y: =40
                Children:
                  - AddExpenseSideBarNavigation:
                      Control: ModernTabList@1.0.0
                      Properties:
                        Alignment: =LayoutDirection.Vertical
                        Default: =varTab
                        FillPortions: =1
                        ItemDisplayText: =ThisItem.name
                        Items: =tablListItems
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        OnSelect: |-
                          =UpdateContext({varTab: Self.Selected});
                          Navigate(AddExpenseSideBarNavigation.Selected.Screen)
            - AddExpenseFormContainer:
