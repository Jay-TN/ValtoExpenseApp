                              MaxLength: =DataSourceInfo([@Expenses], DataSourceInfo.MaxLength, Title)
                              Required: =false
                              Update: =DataCardValue1.Value
                              Visible: =false
                              X: =0
                              Y: =0
                            Children:
                              - DataCardKey1:
                                  Control: Text@0.0.51
