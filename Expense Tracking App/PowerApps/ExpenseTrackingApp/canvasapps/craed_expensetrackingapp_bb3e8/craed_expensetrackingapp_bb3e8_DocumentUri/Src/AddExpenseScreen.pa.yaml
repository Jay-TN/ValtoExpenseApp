                                    Height: =30
                                    Text: ="*"
                                    Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                                    Width: =30
                                    Y: =DataCardKey2.Y
                        - CurrencyID_DataCard1:
                            Control: TypedDataCard@1.0.7
                            Variant: ComboBoxEdit
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              DataField: ="CurrencyID"
                              Default: =ThisItem.CurrencyID
                              DisplayName: =DataSourceInfo([@Expenses],DataSourceInfo.DisplayName,CurrencyID)
                              Required: =true
                              Update: |-
                                ={
                                    '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedReference",
                                    Id: Text(Value(DataCardValue5.Selected.ID), "000"),
                                    Value: DataCardValue5.Selected.Title
                                }
                              X: =0
                              Y: =2
                            Children:
                              - DataCardKey5:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =22
                                    Text: ="Currency"
                                    Weight: ='TextCanvas.Weight'.Semibold
                                    Width: =Parent.Width - 48
                                    Wrap: =false
                                    X: =24
                                    Y: =10
                              - DataCardValue5:
                                  Control: ComboBox@0.0.51
                                  Properties:
                                    AccessibleLabel: =Parent.DisplayName
                                    DefaultSelectedItems: =Blank()
                                    DisplayMode: =Parent.DisplayMode
                                    Items: =Currency
                                    Required: =Parent.Required
                                    ValidationState: =If(IsBlank(Parent.Error), "None", "Error")
                                    Width: =Parent.Width - 48
                                    X: =24
                                    Y: =DataCardKey5.Y + DataCardKey5.Height + 4
                                  Children:
                                    - Title2:
                                        Control: ComboBoxDataField@1.5.0
                                        Variant: textualColumn
                                        IsLocked: true
                                        Properties:
                                          FieldDisplayName: ="Title"
                                          FieldName: ="Title"
                                          FieldType: ="s"
                                          Order: =2
                                    - Currency1:
                                        Control: ComboBoxDataField@1.5.0
                                        Variant: textualColumn
                                        IsLocked: true
                                        Properties:
                                          FieldDisplayName: ="Currency"
                                          FieldName: ="field_1"
                                          FieldType: ="s"
                                          Order: =1
                                    - Exchange Rate1:
                                        Control: ComboBoxDataField@1.5.0
                                        Variant: textualColumn
                                        IsLocked: true
                                        Properties:
                                          FieldDisplayName: ="Exchange Rate"
                                          FieldName: ="field_2"
                                          FieldType: ="n"
                                          Order: =3
                                    - Attachments2:
                                        Control: ComboBoxDataField@1.5.0
                                        Variant: textualColumn
                                        IsLocked: true
                                        Properties:
                                          FieldDisplayName: ="Attachments"
                                          FieldName: ="{Attachments}"
                                          FieldType: ="r*"
                                          Order: =4
                              - ErrorMessage5:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =30
                                    Text: =Parent.Error
                                    Visible: =And(!IsBlank(Parent.Error), Parent.DisplayMode=DisplayMode.Edit)
                                    Width: =Parent.Width - 48
                                    X: =24
                                    Y: =DataCardValue5.Y + DataCardValue5.Height
                              - StarVisible5:
                                  Control: Text@0.0.51
                                  Properties:
                                    Align: ='TextCanvas.Align'.Center
                                    Height: =20
                                    Text: ="*"
                                    Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                                    Width: =30
                                    Y: =DataCardKey5.Y
                        - ApprovalD_DataCard1:
                            Control: TypedDataCard@1.0.7
                            Variant: ComboBoxEdit
                            IsLocked: true
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              DataField: ="ApprovalD"
                              Default: =ThisItem.ApprovalD
                              DisplayName: =DataSourceInfo([@Expenses],DataSourceInfo.DisplayName,ApprovalD)
                              Required: =false
                              Update: =DataCardValue7.Selected
                              Visible: =false
                              X: =0
                              Y: =3
                            Children:
                              - DataCardKey7:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =22
                                    Text: =Parent.DisplayName
                                    Weight: ='TextCanvas.Weight'.Semibold
                                    Width: =Parent.Width - 48
                                    Wrap: =false
                                    X: =24
                                    Y: =10
                              - DataCardValue7:
                                  Control: ComboBox@0.0.51
                                  Properties:
                                    AccessibleLabel: =Parent.DisplayName
                                    DefaultSelectedItems: =[Parent.Default]
                                    DisplayMode: =Parent.DisplayMode
                                    Items: =Choices([@Expenses].ApprovalD)
                                    Required: =Parent.Required
                                    ValidationState: =If(IsBlank(Parent.Error), "None", "Error")
                                    Width: =Parent.Width - 48
                                    X: =24
                                    Y: =DataCardKey7.Y + DataCardKey7.Height + 4
                              - ErrorMessage7:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =30
                                    Text: =Parent.Error
                                    Visible: =And(!IsBlank(Parent.Error), Parent.DisplayMode=DisplayMode.Edit)
                                    Width: =Parent.Width - 48
                                    X: =24
                                    Y: =DataCardValue7.Y + DataCardValue7.Height
                              - StarVisible7:
                                  Control: Text@0.0.51
                                  Properties:
                                    Align: ='TextCanvas.Align'.Center
                                    Height: =20
                                    Text: ="*"
                                    Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                                    Width: =30
                                    Y: =DataCardKey7.Y
                        - CategoryName_DataCard3:
                            Control: TypedDataCard@1.0.7
                            Variant: TextualEdit
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              DataField: ="CategoryName"
                              Default: =ThisItem.CategoryName
                              DisplayName: =DataSourceInfo([@Expenses],DataSourceInfo.DisplayName,CategoryName)
                              MaxLength: =DataSourceInfo([@Expenses], DataSourceInfo.MaxLength, CategoryName)
                              Required: =true
                              Update: =Combobox2.Selected.Value
                              Width: =913
                              X: =0
                              Y: =4
                            Children:
                              - DataCardKey38:
                                  Control: Text@0.0.51
                                  MetadataKey: FieldName
                                  Properties:
                                    Height: =22
                                    Text: =Parent.DisplayName
                                    Weight: ='TextCanvas.Weight'.Semibold
                                    Width: =Parent.Width - 48
                                    Wrap: =false
                                    X: =24
                                    Y: =10
                              - ErrorMessage33:
                                  Control: Text@0.0.51
                                  MetadataKey: ErrorMessage
                                  Properties:
                                    Height: =30
                                    Text: =Parent.Error
                                    Visible: =And(!IsBlank(Parent.Error), Parent.DisplayMode=DisplayMode.Edit)
                                    Width: =Parent.Width - 48
                                    X: =24
                                    Y: =Combobox2.Y + Combobox2.Height
                              - StarVisible34:
                                  Control: Text@0.0.51
                                  MetadataKey: FieldRequired
                                  Properties:
                                    Align: ='TextCanvas.Align'.Center
                                    Height: =30
                                    Text: ="*"
                                    Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                                    Width: =30
                                    Y: =DataCardKey38.Y
                              - Combobox2:
                                  Control: ModernCombobox@1.0.0
                                  Properties:
                                    DefaultSelectedItems: =Blank()
                                    IsSearchable: =false
                                    ItemDisplayText: =ThisItem.Value
                                    Items: =["Food", "Travel", "Accommodation", "Office Supplies", "Software", "Hardware", "Other"]
                                    SelectMultiple: =false
                                    Width: =751
                                    X: =24
                                    Y: =40
                        - Status_DataCard1:
                            Control: TypedDataCard@1.0.7
                            Variant: TextualEdit
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              DataField: ="field_2"
                              Default: =ThisItem.Status
                              DisplayName: =DataSourceInfo([@Expenses],DataSourceInfo.DisplayName,'field_2')
                              MaxLength: =DataSourceInfo([@Expenses], DataSourceInfo.MaxLength, 'field_2')
                              Required: =true
                              Update: =DataCardValue3.Value
                              Width: =913
                              X: =0
                              Y: =5
                            Children:
                              - DataCardKey3:
                                  Control: Text@0.0.51
                                  MetadataKey: FieldName
                                  Properties:
                                    Height: =22
                                    Text: =Parent.DisplayName
                                    Weight: ='TextCanvas.Weight'.Semibold
                                    Width: =Parent.Width - 48
                                    Wrap: =false
                                    X: =24
                                    Y: =10
                              - DataCardValue3:
                                  Control: TextInput@0.0.54
                                  MetadataKey: FieldValue
                                  Properties:
                                    AccessibleLabel: =Parent.DisplayName
                                    DisplayMode: =DisplayMode.View
                                    Mode: ="'TextInputCanvas.Mode'.TextInputModeSingleLine"
                                    Required: =Parent.Required
                                    ValidationState: =If(IsBlank(Parent.Error), "None", "Error")
                                    Value: ="In Progress"
                                    Width: =Parent.Width - 48
                                    X: =24
                                    Y: =DataCardKey3.Y + DataCardKey3.Height + 4
                              - ErrorMessage3:
                                  Control: Text@0.0.51
                                  MetadataKey: ErrorMessage
                                  Properties:
                                    Height: =30
                                    Text: =Parent.Error
                                    Visible: =And(!IsBlank(Parent.Error), Parent.DisplayMode=DisplayMode.Edit)
                                    Width: =Parent.Width - 48
                                    X: =24
                                    Y: =DataCardValue3.Y + DataCardValue3.Height
                              - StarVisible3:
                                  Control: Text@0.0.51
                                  MetadataKey: FieldRequired
                                  Properties:
                                    Align: ='TextCanvas.Align'.Center
                                    Height: =30
                                    Text: ="*"
                                    Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                                    Width: =30
                                    Y: =DataCardKey3.Y
                  - ButtonCanvas3:
                      Control: Button@0.0.45
                      Properties:
                        Align: =Align.Center
                        Height: =50
                        OnSelect: "=//Add the next ID number to be used in Sharepoint\nUpdateContext(\n    {\n        varNextExpenseID: \"EXP\" & Text(\n            Value(\n                Right(\n                    Last(Expenses).Title,\n                    3\n                )\n            ) + 1,\n            \"000\"\n        )\n    }\n);\nDataCardValue1.Value = varNextExpenseID;\n\nSubmitForm(AddExpenseForm);\n\nIf(\n    AddExpenseForm.LastSubmit.ID <> Blank(),\n    \n    // Get the user record\n    UpdateContext({varUser: LookUp(User, Title = currentUserLogin.Title)});\n    \n    // Patch with all required fields\n    Patch(\n        Expenses,\n        LookUp(Expenses, ID = AddExpenseForm.LastSubmit.ID),\n        {\n            UserID: {\n                '@odata.type': \"#Microsoft.Azure.Connectors.SharePoint.SPListExpandedReference\",\n                Id: varUser.ID,\n                Value: varUser.Title\n            }\n        }\n    );\n    \n    Notify(\"Success!\");\n    ResetForm(AddExpenseForm)\n)"
                        Text: ="Add Expense"
                        Width: =250
                        X: =40
                        Y: =40
