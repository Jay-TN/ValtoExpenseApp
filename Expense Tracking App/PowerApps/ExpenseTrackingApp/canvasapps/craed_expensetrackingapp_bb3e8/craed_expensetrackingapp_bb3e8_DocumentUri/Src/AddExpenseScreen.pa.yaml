                        - Amount_DataCard1:
                            Control: TypedDataCard@1.0.7
                            Variant: NumberEdit
                            IsLocked: true
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              DataField: ="field_1"
                              Default: =ThisItem.Amount
