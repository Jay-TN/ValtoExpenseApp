Screens:
  HomeScreen:
    Properties:
      Fill: =
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: =UpdateContext({varTab:{name:"Home Screen",Screen:HomeScreen}});
    Children:
      - HomeScreenGrid:
          Control: GroupContainer@1.5.0
          Variant: GridLayout
          Properties:
            Fill: =Color.DarkBlue
            Height: =Parent.Height
            LayoutGap: =16
            LayoutGridColumns: =10
            LayoutGridRows: =8
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - HomeScreenHeader:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGridColumnEnd: =-1
                  LayoutGridColumnStart: =1
                  LayoutGridRowEnd: =1
                  LayoutGridRowStart: =1
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                  X: =40
                  Y: =40
                Children:
                  - WelcomeText:
                      Control: ModernText@1.0.0
                      Properties:
                        AutoHeight: =true
                        FillPortions: =1
                        FontWeight: =FontWeight.Bold
                        Height: =60
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        PaddingLeft: =25
                        Size: =25
                        Text: ="Welcome"
                  - HomeUserIcon:
                      Control: Classic/Icon@2.5.0
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Color: =RGBA(0, 18, 107, 1)
                        Height: =62
                        Icon: =Icon.Person
                        OnSelect: =Set(showSignOut, !showSignOut)
                        X: =40
                        Y: =40
                  - HomeSignOutContainer:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        FillPortions: =0
                        LayoutMinHeight: =16
                        LayoutMinWidth: =1
                        Visible: =showSignOut
                      Children:
                        - HomeUserEmailLabel:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Semibold
                              Height: =41
                              Text: =currentUserEmail
                              Width: =251
                              X: =12
                              Y: =12
                        - HomeSignOutButton:
                            Control: Button@0.0.45
                            Properties:
                              Height: =41
                              OnSelect: |-
                                =Set(showSignOut, false);
                                Set(currentUserEmail, Blank());
                                Set(currentUserRole, Blank());
                                Set(currentUserLogin, Blank());
                                Navigate(SignInScreen);
                              Text: ="SignOut"
                              Width: =119
                              X: =362
                              Y: =12
            - HomeNavigationSideBar:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGridColumnEnd: =4
                  LayoutGridColumnStart: =1
                  LayoutGridRowEnd: =-1
                  LayoutGridRowStart: =2
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                  X: =40
                  Y: =40
                Children:
                  - HomeSideBarNavigation:
                      Control: ModernTabList@1.0.0
                      Properties:
                        Alignment: =LayoutDirection.Vertical
                        Default: =varTab
                        FillPortions: =1
                        ItemDisplayText: =ThisItem.name
                        Items: =tablListItems
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        OnSelect: |-
                          =UpdateContext({varTab: Self.Selected});
                          Navigate(HomeSideBarNavigation.Selected.Screen)
            - ExpenseOverview:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGridColumnEnd: =-1
                  LayoutGridColumnStart: =4
                  LayoutGridRowEnd: =-1
                  LayoutGridRowStart: =2
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                  X: =40
                  Y: =40
                Children:
                  - Title11:
                      Control: Label@2.5.1
                      Group: CompositePieChart1
                      Properties:
                        Align: =Align.Center
                        BorderColor: =RGBA(0, 0, 0, 1)
                        Font: =Font.'Open Sans'
                        Height: =25
                        Size: =14
                        Text: ="Your Expenses"
                        Width: =800
                        X: =40
                        Y: =40
                  - PieChart1:
                      Control: PieChart@2.3.0
                      Group: CompositePieChart1
                      Properties:
                        FillPortions: =1
                        ItemColorSet: =
                        Items: |-
                          =AddColumns(
                              GroupBy(
                                  AddColumns(
                                      Filter(Expenses, UserID.Value = currentUserLogin.Title),
                                      CategoryText,
                                      CategoryName
                                  ),
                                  CategoryText,
                                  GroupedData
                              ),
                              TotalAmountText,
                              "£" & Text(Sum(GroupedData, Amount), "#,##0.00")
                          )
                        Items.Labels: =TotalAmountText
                        Items.Series: =TotalAmountText
                        Width: =800
                        X: =40
                        Y: =70
                  - Legend1:
                      Control: Legend@2.1.0
                      Group: CompositePieChart1
                      Properties:
                        Font: =Font.'Open Sans'
                        Height: =100
                        ItemColorSet: =PieChart1.ItemColorSet
                        Items: |+
                          =AddColumns(
                              GroupBy(
                                  AddColumns(
                                      Filter(Expenses, UserID.Value = currentUserLogin.Title),
                                      CategoryText,
                                      CategoryName
                                  ),
                                  CategoryText,
                                  GroupedData
                              ),
                              TotalAmountText,
                              "£" & Text(Sum(GroupedData, Amount), "#,##0.00")
                          )
                        Items.Value: =CategoryText
                        Size: =16
                        Width: =800
                        X: =40
                        Y: =470
