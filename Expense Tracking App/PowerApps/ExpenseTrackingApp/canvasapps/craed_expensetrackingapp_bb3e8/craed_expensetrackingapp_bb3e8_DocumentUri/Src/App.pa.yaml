App:
  Properties:
    Formulas: |-
      =currUserRole = currentUserRole;
      tablListItems = Switch(
          currUserRole,
          "Employee",
          Table(
              {
                  name: "Home Screen",
                  Screen: HomeScreen
              },
              {
                  name: "Expense",
                  Screen: ExpenseScreen
              },
              {
                  name: "Add Expense",
                  Screen: AddExpenseScreen
              }
          ),
          "Manager",
          Table(
              {
                  name: "Home Screen",
                  Screen: HomeScreen
              },
              {
                  name: "Expense",
                  Screen: ExpenseScreen
              },
              {
                  name: "Add Expense",
                  Screen: AddExpenseScreen
              },
              {
                  name: "Business Overview",
                  Screen: BusinessOverviewScreen

              },
              {
                  name: "Approvals",
                  Screen: HomeScreen
              }
          ),
          "Admin",
          Table(
              {
                  name: "Home Screen",
                  Screen: HomeScreen
              },
              {
                  name: "Expense",
                  Screen: ExpenseScreen
              },
              {
                  name: "Add Expense",
                  Screen: AddExpenseScreen
              },
              {
                  name: "Business Overview",
                  Screen: BusinessOverviewScreen
              },
              {
                  name: "Approvals",
                  Screen: HomeScreen
              },
              {
                  name: "Admin Area",
                  Screen: HomeScreen
              }
          )
      );
    StartScreen: =SignInScreen
    Theme: =PowerAppsTheme
