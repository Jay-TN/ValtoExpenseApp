Screens:
  AdminAreaScreen:
    Properties:
      Fill: =
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: =UpdateContext({varTab:{name:"Admin Area",Screen:AdminAreaScreen}});
    Children:
      - AdminAreaScreenGrid:
          Control: GroupContainer@1.5.0
          Variant: GridLayout
          Properties:
            Fill: =Color.DarkBlue
            Height: =Parent.Height
            LayoutGap: =16
            LayoutGridColumns: =10
            LayoutGridRows: =8
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - AdminAreaScreenHeader:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGridColumnEnd: =-1
                  LayoutGridColumnStart: =1
                  LayoutGridRowEnd: =1
                  LayoutGridRowStart: =1
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                  X: =40
                  Y: =40
                Children:
                  - AdminAreaText:
                      Control: ModernText@1.0.0
                      Properties:
                        AutoHeight: =true
                        FillPortions: =1
                        FontWeight: =FontWeight.Bold
                        Height: =60
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        PaddingLeft: =25
                        Size: =25
                        Text: ="Admin Area"
                  - AdminAreaUserIcon:
                      Control: Classic/Icon@2.5.0
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Color: =RGBA(0, 18, 107, 1)
                        Height: =62
                        Icon: =Icon.Person
                        OnSelect: =Set(showSignOut, !showSignOut)
                        X: =40
                        Y: =40
                  - AdminAreaSignOutContainer:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        FillPortions: =0
                        LayoutMinHeight: =16
                        LayoutMinWidth: =1
                        Visible: =showSignOut
                      Children:
                        - AdminAreaUserEmailLabel:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Semibold
                              Height: =41
                              Text: =currentUserEmail
                              Width: =251
                              X: =12
                              Y: =12
                        - AdminAreaSignOutButton:
                            Control: Button@0.0.45
                            Properties:
                              Height: =41
                              OnSelect: |-
                                =Set(showSignOut, false);
                                Set(currentUserEmail, Blank());
                                Set(currentUserRole, Blank());
                                Set(currentUserLogin, Blank());
                                Navigate(SignInScreen);
                              Text: ="SignOut"
                              Width: =119
                              X: =362
                              Y: =12
            - AdminAreaNavigationSideBar:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGridColumnEnd: =4
                  LayoutGridColumnStart: =1
                  LayoutGridRowEnd: =-1
                  LayoutGridRowStart: =2
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                  X: =40
                  Y: =40
                Children:
                  - AdminAreaSideBarNavigation:
                      Control: ModernTabList@1.0.0
                      Properties:
                        Alignment: =LayoutDirection.Vertical
                        Default: =varTab
                        FillPortions: =1
                        ItemDisplayText: =ThisItem.name
                        Items: =tablListItems
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        OnSelect: |-
                          =UpdateContext({varTab: Self.Selected});
                          Navigate(AdminAreaSideBarNavigation.Selected.Screen)
            - AdminAreaContainer:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGridColumnEnd: =-1
                  LayoutGridColumnStart: =4
                  LayoutGridRowEnd: =-1
                  LayoutGridRowStart: =2
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                  X: =40
                  Y: =40
                Children:
                  - AdminAreaContainerGallery:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                      Children:
                        - UserGallery:
                            Control: Gallery@2.15.0
                            Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              Height: =625
                              Items: =User
                              OnSelect: =Navigate(AdminAreaEditScreen)
                              Width: =582
                              Y: =1
                            Children:
                              - Image1:
                                  Control: Image@2.2.3
                                  Properties:
                                    BorderColor: =RGBA(0, 18, 107, 1)
                                    Height: =72
                                    OnSelect: =Select(Parent)
                                    RadiusBottomLeft: =8
                                    RadiusBottomRight: =8
                                    RadiusTopLeft: =8
                                    RadiusTopRight: =8
                                    Width: =72
                                    X: =16
                                    Y: =(Parent.TemplateHeight / 2) - (Self.Height / 2)
                              - Title1:
                                  Control: Label@2.5.1
                                  Properties:
                                    BorderColor: =RGBA(0, 0, 0, 1)
                                    Color: =RGBA(50, 49, 48, 1)
                                    Font: =Font.'Open Sans'
                                    FontWeight: =If(ThisItem.IsSelected, FontWeight.Semibold, FontWeight.Normal)
                                    Height: =25
                                    OnSelect: =Select(Parent)
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =14
                                    Text: =ThisItem.FullName
                                    VerticalAlign: =VerticalAlign.Top
                                    Width: =232
                                    X: =103
                                    Y: =(Parent.TemplateHeight - (Self.Size * 1.8 + Subtitle1.Size * 1.8)) / 2
                              - Subtitle1:
                                  Control: Label@2.5.1
                                  Properties:
                                    BorderColor: =RGBA(0, 0, 0, 1)
                                    Font: =Font.'Open Sans'
                                    FontWeight: =If(ThisItem.IsSelected, FontWeight.Semibold, FontWeight.Normal)
                                    Height: =23
                                    OnSelect: =Select(Parent)
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =12
                                    Text: =ThisItem.Email
                                    VerticalAlign: =VerticalAlign.Top
                                    Width: =269
                                    X: =Title1.X
                                    Y: =Title1.Y + Title1.Height
                              - NextArrow1:
                                  Control: Classic/Icon@2.5.0
                                  Properties:
                                    AccessibleLabel: =Self.Tooltip
                                    BorderColor: =RGBA(0, 0, 0, 1)
                                    Color: =RGBA(166, 166, 166, 1)
                                    DisabledBorderColor: =RGBA(56, 56, 56, 1)
                                    DisabledColor: =RGBA(119, 119, 119, 1)
                                    Height: =50
                                    Icon: =Icon.ChevronRight
                                    OnSelect: =Select(Parent)
                                    PaddingBottom: =16
                                    PaddingLeft: =16
                                    PaddingRight: =16
                                    PaddingTop: =16
                                    Tooltip: ="View item details"
                                    Width: =50
                                    X: =Parent.TemplateWidth - Self.Width - 12
                                    Y: =(Parent.TemplateHeight / 2) - (Self.Height / 2)
                              - Separator1:
                                  Control: Rectangle@2.3.0
                                  Properties:
                                    BorderColor: =RGBA(0, 18, 107, 1)
                                    Fill: =RGBA(255, 255, 255, 1)
                                    Height: =8
                                    OnSelect: =Select(Parent)
                                    Width: =Parent.TemplateWidth
                                    Y: =Parent.TemplateHeight - Self.Height
                              - Rectangle1:
                                  Control: Rectangle@2.3.0
                                  Properties:
                                    BorderColor: =RGBA(0, 18, 107, 1)
                                    Fill: =RGBA(0, 18, 107, 1)
                                    Height: =Parent.TemplateHeight - Separator1.Height
                                    OnSelect: =Select(Parent)
                                    Visible: =ThisItem.IsSelected
                                    Width: =4
                              - Label1:
                                  Control: Label@2.5.1
                                  Properties:
                                    BorderColor: =RGBA(0, 18, 107, 1)
                                    Font: =Font.'Open Sans'
                                    Height: =33
                                    OnSelect: =Select(Parent)
                                    Text: =ThisItem.Department
                                    Width: =121
                                    X: =342
                                    Y: =28
                              - Label1_1:
                                  Control: Label@2.5.1
                                  Properties:
                                    BorderColor: =RGBA(0, 18, 107, 1)
                                    Font: =Font.'Open Sans'
                                    Height: =33
                                    OnSelect: =Select(Parent)
                                    Text: =ThisItem.Role.Value
                                    Width: =121
                                    X: =427
                                    Y: =31
